version: 2

builds:
  - id: "nomad-ci-cd"
    flags:
      - -v
    ldflags:
      - -s -w -extldflags '-static'
      - -X github.com/habibiefaried/nomad-ci-cd/helper.Version={{ .Env.IMAGE_TAG }}
    goarch:
      - amd64
      - 386
    goos:
      - linux
    env:
      - CGO_ENABLED=0
    skip: false

archives:
  - format: binary
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"